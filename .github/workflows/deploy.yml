name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://krill-bill.pages.dev

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Deploy (placeholder)
        run: |
          echo "Cloudflare deploy step pending credential setup."
          echo "Configure CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID when ready."
